<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B894;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 纯净图标主体 -->
  <g filter="url(#shadow)">
    <!-- 渐变圆角背景 -->
    <rect x="22" y="22" width="76" height="76" rx="18" fill="url(#iconGrad)"/>
    <!-- 代码符号 < -->
    <polyline points="38,44 50,60 38,76" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 代码符号 > -->
    <polyline points="62,44 50,60 62,76" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 代码符号 / -->
    <line x1="56" y1="38" x2="44" y2="82" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
